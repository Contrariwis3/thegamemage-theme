{{ define "main" }}

{{ if and .Title (not .IsHome) }}
<div class="card">
  <h1>{{ .Title }}</h1>
</div>
{{ end }}

{{ $paginator := .Paginate (where .Pages.ByDate.Reverse "Type" "post") }}
{{ range $paginator.Pages }}
{{ partial "post-card.html" . }}
{{ end }}

{{ partial "pagination.html" $paginator }}

{{ end }}
