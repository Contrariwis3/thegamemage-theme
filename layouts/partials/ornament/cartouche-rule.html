{{/*
  The cartouche rule: a hairline with a centered fleuron. Sits above
  the post title in the incipit. Authored at viewBox 200x16; the host
  CSS sets the width. Stroke and fill follow currentColor so the rule
  inherits the hairline ink from its container.
*/}}
<svg class="cartouche-rule" viewBox="0 0 200 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" preserveAspectRatio="none">
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="square">
    <line x1="0" y1="8" x2="84" y2="8" />
    <line x1="116" y1="8" x2="200" y2="8" />
  </g>
  {{/* A small centered fleuron — a four-petal diamond inside a ring,
       evoking the four-leaf printers' ornaments of the Fell period
       without quoting any specific glyph. */}}
  <g fill="currentColor" stroke="none" transform="translate(100 8)">
    <path d="M 0 -5 L 3 0 L 0 5 L -3 0 Z" />
    <circle cx="-7" cy="0" r="1" />
    <circle cx="7"  cy="0" r="1" />
  </g>
</svg>
