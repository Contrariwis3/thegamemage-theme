{{/*
  A small printed registration crosshair, sized to its container by
  CSS. Takes a single positional class hint via .Get 0 (tl|tr|bl|br).
  Author once; reuse at each corner of a tipped-in plate. Stroke
  follows currentColor so it inks-down with the surrounding text.
*/}}
{{- $pos := . -}}
<svg class="corner-mark corner-mark--{{ $pos }}" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="square">
    <line x1="0" y1="7" x2="14" y2="7" />
    <line x1="7" y1="0" x2="7" y2="14" />
  </g>
</svg>
