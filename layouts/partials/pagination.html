{{/*
  Unboxed pagination, shared by every list. Context: a paginator.
*/}}
{{ if or .HasPrev .HasNext }}
<nav class="pagination" aria-label="Scroll pagination">
  <div class="pure-g">
    <div class="pure-u-1-3 pagination-link previous">
      {{ if .HasPrev }}
      <a href="{{ .Prev.URL }}"><span class="pagination-icon" aria-hidden="true">←</span> Previous</a>
      {{ end }}
    </div>

    <div class="pure-u-1-3 pagination-pages">
      Scroll <span class="page">{{ .PageNumber }}</span> of <span class="page">{{ .TotalPages }}</span>
    </div>

    <div class="pure-u-1-3 pagination-link next">
      {{ if .HasNext }}
      <a href="{{ .Next.URL }}">More <span class="pagination-icon" aria-hidden="true">→</span></a>
      {{ end }}
    </div>
  </div>
</nav>
{{ end }}
